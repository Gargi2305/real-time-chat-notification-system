<!doctype html>
<html>
  <head>
    <title>Login</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Montserrat", sans-serif;
        background-color: #c4d9f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .login-container {
        background: #efb5e0;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        text-align: center;
        width: 250px;
      }

      input {
        display: block;
        margin: 10px auto;
        padding: 10px;
        width: 100%;
        border-radius: 10px;
        border: 1px solid #ccc;
      }

      button {
        margin-top: 10px;
        padding: 10px;
        width: 100%;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
      }

      button:hover {
        background: #1d4ed8;
      }
    </style>
  </head>

  <body>
    <div class="login-container">
      <h2 id="form-title">Login</h2>

      <input type="text" id="name" placeholder="Name" />
      <input type="email" id="email" placeholder="Email" />
      <input type="password" id="password" placeholder="Password" />

      <button onclick="handleAuth()">Login</button>

      <p id="toggle-text">
        New user?
        <span onclick="toggleMode()" style="color: blue; cursor: pointer">
          Sign up
        </span>
      </p>
    </div>

    <script>
      let isLogin = true;

      function toggleMode() {
        isLogin = !isLogin;

        document.getElementById("form-title").innerText = isLogin
          ? "Login"
          : "Sign Up";
        document.querySelector("button").innerText = isLogin
          ? "Login"
          : "Sign Up";

        document.getElementById("toggle-text").innerHTML = isLogin
          ? `New user? <span onclick="toggleMode()" style="color: blue; cursor: pointer;">Sign up</span>`
          : `Already have an account? <span onclick="toggleMode()" style="color: blue; cursor: pointer;">Login</span>`;
      }

      async function handleAuth() {
        const name = document.getElementById("name").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        const url = isLogin
          ? "http://localhost:3000/login"
          : "http://localhost:3000/signup";

        try {
          const res = await fetch(url, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ name, email, password }),
          });

          const data = await res.json();

          if (isLogin) {
            // ✅ ADD THIS CHECK
            if (res.ok && data.token) {
              localStorage.setItem("token", data.token);

              alert("Login successful");
              window.location.href = "chat.html";
            } else {
              alert("Login failed");
            }
          } else {
            if (res.ok) {
              alert("Signup successful! Please login.");
              toggleMode();
            } else {
              alert(data.error || "Signup failed");
            }
          }
        } catch (err) {
          alert("Request failed");
          console.error(err);
        }
      }
    </script>
  </body>
</html>
